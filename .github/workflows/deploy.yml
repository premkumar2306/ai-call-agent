name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  WORKER_NAME: avery-platform
  WEB_PROJECT_NAME: avery-admin
  WORKER_API_URL: https://avery-platform.premkumar-2ba.workers.dev

jobs:
  deploy-worker:
    name: Deploy Worker
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply ${{ env.WORKER_NAME }} --remote

      - name: Deploy Worker
        run: npx wrangler deploy

  deploy-web:
    name: Deploy Web (Pages)
    needs: deploy-worker
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ env.WORKER_API_URL }}

      - name: Deploy to Pages
        run: npx wrangler pages deploy dist --project-name ${{ env.WEB_PROJECT_NAME }}
